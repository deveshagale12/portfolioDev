<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin | Unified Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white transform -translate-x-full transition-transform duration-300 lg:translate-x-0">
        <div class="p-6 flex items-center justify-between">
            <h2 class="text-2xl font-bold flex items-center gap-2 text-blue-400"><i data-lucide="shield-check"></i> Admin</h2>
            <button class="lg:hidden" onclick="toggleSidebar()"><i data-lucide="x"></i></button>
        </div>
        <nav class="mt-6">
            <a href="javascript:void(0)" onclick="showTab('overview')" class="flex items-center gap-3 px-6 py-4 hover:bg-slate-800 transition border-l-4 border-transparent hover:border-blue-500"><i data-lucide="layout-grid"></i> Overview</a>
            <a href="javascript:void(0)" onclick="showTab('settings')" class="flex items-center gap-3 px-6 py-4 hover:bg-slate-800 transition border-l-4 border-transparent hover:border-blue-500"><i data-lucide="user-cog"></i> Profile Settings</a>
            <a href="javascript:void(0)" onclick="showTab('projects')" class="flex items-center gap-3 px-6 py-4 hover:bg-slate-800 transition border-l-4 border-transparent hover:border-blue-500"><i data-lucide="layers"></i> My Projects</a>
            <a href="javascript:void(0)" onclick="showTab('skills')" class="flex items-center gap-3 px-6 py-4 hover:bg-slate-800 transition border-l-4 border-transparent hover:border-purple-500"><i data-lucide="zap"></i> Skills</a>
            <a href="javascript:void(0)" onclick="showTab('inbox')" class="flex items-center gap-3 px-6 py-4 hover:bg-slate-800 transition border-l-4 border-transparent hover:border-blue-500"><i data-lucide="message-square"></i> Messages</a>
        </nav>
    </div>

    <div class="lg:ml-64 min-h-screen flex flex-col">
        <header class="sticky top-0 z-40 glass border-b p-4 flex justify-between items-center px-8">
            <div class="flex items-center gap-4">
                <button class="lg:hidden p-2 bg-slate-100 rounded-lg" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
                <h1 id="tab-title" class="text-xl font-bold text-slate-800">Overview</h1>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Server Live</span>
            </div>
        </header>

        <main class="p-6 lg:p-10 flex-grow">
            
            <div id="overview" class="tab-content active">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                        <div class="p-3 bg-blue-50 w-fit rounded-2xl text-blue-600 mb-4"><i data-lucide="folder-kanban"></i></div>
                        <div class="text-slate-500 text-sm font-semibold uppercase">Total Projects</div>
                        <div id="count-projects" class="text-4xl font-black mt-1">0</div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                        <div class="p-3 bg-purple-50 w-fit rounded-2xl text-purple-600 mb-4"><i data-lucide="zap"></i></div>
                        <div class="text-slate-500 text-sm font-semibold uppercase">Total Skills</div>
                        <div id="count-skills" class="text-4xl font-black mt-1">0</div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                        <div class="p-3 bg-green-50 w-fit rounded-2xl text-green-600 mb-4"><i data-lucide="inbox"></i></div>
                        <div class="text-slate-500 text-sm font-semibold uppercase">Messages</div>
                        <div id="count-messages" class="text-4xl font-black mt-1">0</div>
                    </div>
                </div>
            </div>

            <div id="settings" class="tab-content">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <div class="lg:col-span-1">
                        <div class="bg-slate-900 rounded-[2.5rem] p-10 text-white sticky top-28 shadow-2xl border border-white/10">
                            <div class="relative z-10 flex flex-col items-center text-center">
                                <img id="prev-img" src="https://ui-avatars.com/api/?background=random&name=User" class="w-32 h-32 rounded-3xl mb-6 border-4 border-blue-500/30 object-cover shadow-2xl">
                                <h2 id="prev-name" class="text-3xl font-bold tracking-tight">Your Name</h2>
                                <p id="prev-title" class="text-blue-400 font-semibold mb-6">Professional Title</p>
                                <div class="w-full h-px bg-white/10 mb-6"></div>
                                <p id="prev-bio" class="text-slate-400 text-sm leading-relaxed italic">Tell the world your story...</p>
                                <div class="mt-8 pt-6 border-t border-white/5 w-full flex justify-center items-center gap-2 text-slate-500">
                                    <i data-lucide="map-pin" class="w-4 h-4"></i> <span id="prev-location" class="text-xs uppercase font-bold tracking-tighter">Remote</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2 space-y-8">
                        <div class="bg-white rounded-[2.5rem] border border-slate-200 p-10 shadow-sm">
                            <h3 class="text-2xl font-black mb-8 flex items-center gap-3"><i data-lucide="pen-tool" class="text-blue-600"></i> Profile Editor</h3>
                            <form id="profile-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2"><label class="text-xs font-black uppercase text-slate-400">Full Name</label><input type="text" id="form-name" class="w-full p-4 rounded-2xl border-slate-200 bg-slate-50 focus:bg-white transition border outline-none"></div>
                                <div class="space-y-2"><label class="text-xs font-black uppercase text-slate-400">Title</label><input type="text" id="form-title" class="w-full p-4 rounded-2xl border-slate-200 bg-slate-50 focus:bg-white transition border outline-none"></div>
                                <div class="md:col-span-2 space-y-2"><label class="text-xs font-black uppercase text-slate-400">Bio</label><textarea id="form-bio" rows="4" class="w-full p-4 rounded-2xl border-slate-200 bg-slate-50 focus:bg-white transition border outline-none"></textarea></div>
                                <div class="space-y-2"><label class="text-xs font-black uppercase text-slate-400">Email</label><input type="email" id="form-email" class="w-full p-4 rounded-2xl border-slate-200 bg-slate-50 focus:bg-white transition border outline-none"></div>
                                <div class="space-y-2"><label class="text-xs font-black uppercase text-slate-400">Location</label><input type="text" id="form-location" class="w-full p-4 rounded-2xl border-slate-200 bg-slate-50 focus:bg-white transition border outline-none"></div>
                                <div class="space-y-2"><label class="text-xs font-black uppercase text-blue-600">GitHub</label><input type="text" id="form-github" class="w-full p-4 rounded-2xl border-slate-200 bg-slate-50 focus:bg-white transition border outline-none"></div>
                                <div class="space-y-2"><label class="text-xs font-black uppercase text-blue-800">LinkedIn</label><input type="text" id="form-linkedin" class="w-full p-4 rounded-2xl border-slate-200 bg-slate-50 focus:bg-white transition border outline-none"></div>
                                <div class="space-y-2"><label class="text-xs font-black uppercase text-sky-500">Twitter (X)</label><input type="text" id="form-twitter" class="w-full p-4 rounded-2xl border-slate-200 bg-slate-50 focus:bg-white transition border outline-none"></div>
                                <div class="space-y-2"><label class="text-xs font-black uppercase text-green-600">Resume Link</label><input type="text" id="form-resume" class="w-full p-4 rounded-2xl border-slate-200 bg-slate-50 focus:bg-white transition border outline-none"></div>
                                
                                <div class="md:col-span-2 mt-8 pt-8 border-t border-slate-100 grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div class="bg-blue-50/50 p-6 rounded-3xl border border-blue-100 text-center">
                                        <label class="text-xs font-black uppercase text-blue-600 mb-3 block">Profile Photo</label>
                                        <input type="file" id="file-avatar" class="text-xs mb-3 w-full">
                                        <button type="button" onclick="uploadFile('avatar')" class="w-full bg-blue-600 text-white py-2 rounded-xl text-xs font-bold hover:bg-blue-700">Upload Photo</button>
                                    </div>
                                    <div class="bg-green-50/50 p-6 rounded-3xl border border-green-100 text-center">
                                        <label class="text-xs font-black uppercase text-green-600 mb-3 block">Resume PDF</label>
                                        <input type="file" id="file-resume" class="text-xs mb-3 w-full">
                                        <button type="button" onclick="uploadFile('resume')" class="w-full bg-green-600 text-white py-2 rounded-xl text-xs font-bold hover:bg-green-700">Upload Resume</button>
                                    </div>
                                </div>

                                <div class="md:col-span-2 pt-6">
                                    <button type="button" onclick="handleProfileSubmit('PUT')" class="w-full bg-blue-600 text-white py-5 rounded-[1.5rem] font-black text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center gap-3">
                                        <i data-lucide="save"></i> Update Everything
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div id="projects" class="tab-content">
                <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-8 border-b bg-slate-50 flex justify-between items-center">
                        <h3 class="font-black text-xl">Manage Projects</h3>
                        <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-3 rounded-full text-xs font-bold hover:bg-blue-700 transition">+ Add New Project</button>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50 text-slate-400 text-[10px] uppercase font-black">
                            <tr><th class="p-6">Project Title</th><th class="p-6">Action</th></tr>
                        </thead>
                        <tbody id="project-table-body"></tbody>
                    </table>
                </div>
            </div>
            <div id="skills" class="tab-content">
    <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
        <div class="p-8 border-b bg-slate-50 flex justify-between items-center">
            <h3 class="font-black text-xl flex items-center gap-2"><i data-lucide="zap" class="text-purple-600"></i> Manage Skills</h3>
            <button onclick="openSkillModal()" class="bg-purple-600 text-white px-6 py-3 rounded-full text-xs font-bold hover:bg-purple-700 transition shadow-lg shadow-purple-100">+ Add New Skill</button>
        </div>
        <div class="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="skills-list-container">
            </div>
    </div>
</div>

            <div id="inbox" class="tab-content">
                <div id="message-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </main>
    </div>

   <div id="project-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl relative z-10 overflow-hidden border border-slate-200">
        <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
            <h3 class="text-xl font-black flex items-center gap-2"><i data-lucide="plus-circle" class="text-blue-600"></i> New Project</h3>
            <button onclick="closeModal()" class="p-2 hover:bg-slate-200 rounded-full transition"><i data-lucide="x"></i></button>
        </div>
        
        <form id="project-form" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[80vh] overflow-y-auto">
            <div class="md:col-span-2 space-y-1">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Title</label>
                <input type="text" id="proj-title" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white transition outline-none">
            </div>

            <div class="md:col-span-2 space-y-1">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Description</label>
                <textarea id="proj-desc" rows="2" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white transition outline-none"></textarea>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Tech Stack</label>
                <input type="text" id="proj-tech" placeholder="React, Spring Boot" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 outline-none">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">GitHub URL</label>
                <input type="text" id="proj-github" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 outline-none">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Live Demo URL</label>
                <input type="text" id="proj-live" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 outline-none">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Project Image</label>
                <div class="flex items-center gap-3 p-2 border border-slate-200 rounded-xl bg-slate-50">
                    <img id="modal-preview" src="https://placehold.co/100x100?text=..." class="w-12 h-12 rounded-lg object-cover border">
                    <input type="file" id="proj-file" onchange="previewProjectImage(this)" class="text-[10px] flex-1">
                </div>
            </div>

            <div class="md:col-span-2 pt-4">
                <button type="button" onclick="saveProject()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="check-circle"></i> Save Project
                </button>
            </div>
        </form>
    </div>
</div>
<div id="skill-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeSkillModal()"></div>
    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl relative z-10 border border-slate-200 p-8">
        <h3 class="text-xl font-black mb-6">Add New Skill</h3>
        <form id="skill-form" class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Skill Name</label>
                <input type="text" id="skill-name" placeholder="e.g. Java" class="w-full p-4 rounded-2xl border-slate-200 bg-slate-50 focus:bg-white transition border outline-none">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Category</label>
                <select id="skill-category" class="w-full p-4 rounded-2xl border-slate-200 bg-slate-50 outline-none border">
                    <option value="Backend">Backend</option>
                    <option value="Frontend">Frontend</option>
                    <option value="Database">Database</option>
                    <option value="DevOps">DevOps</option>
                </select>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between ml-2">
                    <label class="text-[10px] font-black uppercase text-slate-400">Proficiency Level</label>
                    <span id="range-val" class="text-xs font-bold text-purple-600">80%</span>
                </div>
                <input type="range" id="skill-level" min="1" max="100" value="80" oninput="document.getElementById('range-val').innerText = this.value + '%'" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-purple-600">
            </div>
            <button type="button" onclick="saveSkill()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-purple-600 transition mt-4">Save Skill</button>
        </form>
    </div>
</div>
    <script>
        const API_BASE = "https://portfoliodev-hy0w.onrender.com/api/v1";
        const HEADERS = { "X-API-KEY": "portfolio-dev", "Content-Type": "application/json" };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            const trigger = document.querySelector(`[onclick="showTab('${tabId}')"]`);
            document.getElementById('tab-title').innerText = trigger ? trigger.innerText : "Dashboard";
            if(window.innerWidth < 1024) toggleSidebar();
            lucide.createIcons();
        }

        // --- PROFILE LOGIC ---
        function updatePreview(profile) {
            if (!profile) return;
            document.getElementById('prev-name').innerText = profile.name || "Your Name";
            document.getElementById('prev-title').innerText = profile.title || "Professional Title";
            document.getElementById('prev-bio').innerText = profile.bio || "Tell the world your story...";
            document.getElementById('prev-location').innerText = profile.location || "Earth";
            
            if(profile.profilePictureUrl) {
                document.getElementById('prev-img').src = `https://portfoliodev-hy0w.onrender.com${profile.profilePictureUrl}`;
            }

            document.getElementById('form-name').value = profile.name || "";
            document.getElementById('form-title').value = profile.title || "";
            document.getElementById('form-bio').value = profile.bio || "";
            document.getElementById('form-email').value = profile.email || "";
            document.getElementById('form-location').value = profile.location || "";
            document.getElementById('form-github').value = profile.github || "";
            document.getElementById('form-linkedin').value = profile.linkedinUrl || "";
            document.getElementById('form-twitter').value = profile.twitterUrl || "";
            document.getElementById('form-resume').value = profile.resumeUrl || "";
        }

        async function handleProfileSubmit(method) {
            const data = {
                fullName: document.getElementById('form-name').value,
                professionalTitle: document.getElementById('form-title').value,
                bio: document.getElementById('form-bio').value,
                email: document.getElementById('form-email').value,
                location: document.getElementById('form-location').value,
                githubUrl: document.getElementById('form-github').value,
                linkedinUrl: document.getElementById('form-linkedin').value,
                twitterUrl: document.getElementById('form-twitter').value,
                resumeUrl: document.getElementById('form-resume').value
            };

            try {
                const endpoint = method === 'POST' ? '/portfolio/create' : '/portfolio/update';
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: method, headers: HEADERS, body: JSON.stringify(data)
                });
                if(res.ok) { alert("Profile Updated! 🚀"); loadDashboard(); }
            } catch (err) { alert("Connection Error."); }
        }

        async function uploadFile(type) {
            const fileInput = document.getElementById(type === 'avatar' ? 'file-avatar' : 'file-resume');
            if (!fileInput.files[0]) return alert("Select a file!");
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                const res = await fetch(`${API_BASE}/files/upload`, {
                    method: 'POST', headers: { "X-API-KEY": "portfolio-dev" }, body: formData
                });
                if (res.ok) {
                    const data = await res.json();
                    const payload = type === 'avatar' ? { profilePictureUrl: data.url } : { resumeUrl: data.url };
                    await fetch(`${API_BASE}/portfolio/update`, { method: 'PUT', headers: HEADERS, body: JSON.stringify(payload) });
                    alert("Uploaded Successfully!"); loadDashboard();
                }
            } catch (err) { alert("Upload failed."); }
        }

        // --- PROJECT MODAL LOGIC ---
        function openModal() {
            document.getElementById('project-modal').classList.remove('hidden');
            document.getElementById('project-form').reset();
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('project-modal').classList.add('hidden'); }

        async function saveProject() {
            const title = document.getElementById('proj-name').value;
            const tech = document.getElementById('proj-tech').value;
            const fileInput = document.getElementById('proj-file');

            if (!title) return alert("Title is required!");

            try {
                const res = await fetch(`${API_BASE}/projects/create`, {
                    method: 'POST', headers: HEADERS, body: JSON.stringify({ title, techStack: tech })
                });

                if (res.ok) {
                    const savedProj = await res.json();
                    if (fileInput.files[0]) {
                        const formData = new FormData();
                        formData.append("file", fileInput.files[0]);
                        await fetch(`${API_BASE}/files/upload/project/${savedProj.id}`, {
                            method: 'POST', headers: { "X-API-KEY": "portfolio-dev" }, body: formData
                        });
                    }
                    alert("Project Saved!"); closeModal(); loadDashboard();
                }
            } catch (err) { console.error(err); }
        }

        // --- DASHBOARD SYNC ---
       async function loadDashboard() {
    try {
        const [sumRes, msgRes] = await Promise.all([
            fetch(`${API_BASE}/portfolio/summary`, { headers: HEADERS }).then(r => r.json()),
            fetch(`${API_BASE}/contact/inbox`, { headers: HEADERS }).then(r => r.ok ? r.json() : [])
        ]);

        // 1. Update Overview Counters
        document.getElementById('count-projects').innerText = sumRes.projects?.length || 0;
        document.getElementById('count-skills').innerText = sumRes.skills?.length || 0;
        document.getElementById('count-messages').innerText = msgRes.length || 0;

        // 2. Update Profile Preview
        updatePreview(sumRes.profile);

        // 3. Render Projects Table
        document.getElementById('project-table-body').innerHTML = (sumRes.projects || []).map(p => `
            <tr class="border-b hover:bg-slate-50 transition">
                <td class="p-6 font-bold text-slate-700">${p.title}</td>
                <td class="p-6 text-right">
                    <button onclick="deleteProject(${p.id})" class="text-red-400 hover:text-red-600 transition"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </td>
            </tr>`).join('');

        // 4. ADDED: Render Skills Cards
        const skillsContainer = document.getElementById('skills-list-container');
        if (skillsContainer) {
            skillsContainer.innerHTML = (sumRes.skills || []).map(s => `
                <div class="p-6 bg-white rounded-3xl border border-slate-200 shadow-sm hover:shadow-md transition group relative">
                    <button onclick="deleteSkill(${s.id})" class="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <span class="text-[10px] font-black uppercase px-3 py-1 bg-purple-50 text-purple-600 rounded-full">${s.category || 'General'}</span>
                    <h4 class="font-bold text-slate-800 mt-3 text-lg">${s.name}</h4>
                    <div class="mt-4">
                        <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1">
                            <span>Proficiency</span>
                            <span>${s.proficiencyLevel}%</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div class="bg-purple-500 h-full rounded-full transition-all duration-700" style="width: ${s.proficiencyLevel}%"></div>
                        </div>
                    </div>
                </div>
            `).join('') || `<p class="col-span-full text-center text-slate-400 py-10">No skills added yet.</p>`;
        }

        // 5. Render Messages (Inbox)
        document.getElementById('message-list').innerHTML = (msgRes || []).map(m => `
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-md transition">
                <h4 class="font-black text-slate-800 mb-1">${m.senderName}</h4>
                <p class="text-[10px] text-blue-500 mb-4">${m.senderEmail}</p>
                <p class="text-xs text-slate-500 line-clamp-3">${m.message}</p>
            </div>`).join('');

        // Refresh icons for all new elements
        lucide.createIcons();
    } catch (e) { 
        console.error("Sync failed:", e); 
    }
}

        async function deleteProject(id) {
            if(confirm("Delete project?")) {
                await fetch(`${API_BASE}/projects/delete/${id}`, { method: 'DELETE', headers: HEADERS });
                loadDashboard();
            }
        }

        window.onload = loadDashboard;
        
     // Function to show image preview in modal
        function previewProjectImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('modal-preview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveProject() {
            // 1. Collect Form Data
            const projectData = {
                title: document.getElementById('proj-title').value,
                description: document.getElementById('proj-desc').value,
                techStack: document.getElementById('proj-tech').value,
                githubUrl: document.getElementById('proj-github').value,
                liveDemoUrl: document.getElementById('proj-live').value
            };

            if (!projectData.title) return alert("Title is required!");

            try {
                // 2. POST to ProjectController.java (/api/v1/projects/add)
                const res = await fetch(`${API_BASE}/projects/add`, {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify(projectData)
                });

                if (res.ok) {
                    const savedProject = await res.json();

                    // 3. POST to FileController.java (/api/v1/files/upload/project/{id})
                    const fileInput = document.getElementById('proj-file');
                    if (fileInput.files[0]) {
                        const formData = new FormData();
                        formData.append("file", fileInput.files[0]);
                        
                        await fetch(`${API_BASE}/files/upload/project/${savedProject.id}`, {
                            method: 'POST',
                            headers: { "X-API-KEY": "portfolio-dev" }, // No Content-Type for Multipart
                            body: formData
                        });
                    }

                    alert("Project Created Successfully! ✨");
                    closeModal();
                    loadDashboard(); // Refresh your table
                } else {
                    alert("Check if User Profile exists! Backend requires a User to link projects.");
                }
            } catch (err) {
                console.error("Critical Save Error:", err);
            }
        }

function closeSkillModal() {
    document.getElementById('skill-modal').classList.add('hidden');
}

async function saveSkill() {
    const data = {
        name: document.getElementById('skill-name').value,
        category: document.getElementById('skill-category').value,
        proficiencyLevel: parseInt(document.getElementById('skill-level').value)
    };

    if (!data.name) return alert("Skill name is required!");

    try {
        const res = await fetch(`${API_BASE}/skills/add`, {
            method: 'POST',
            headers: HEADERS,
            body: JSON.stringify(data)
        });

        if (res.ok) {
            closeSkillModal();
            loadDashboard(); // Refresh UI
        } else {
            const err = await res.json();
            alert(err.message || "Error adding skill");
        }
    } catch (err) { console.error(err); }
}

async function deleteSkill(id) {
    if(!confirm("Remove this skill?")) return;
    await fetch(`${API_BASE}/skills/delete/${id}`, { method: 'DELETE', headers: HEADERS });
    loadDashboard();
}

// Update your loadDashboard() function to include this:
async function loadSkillsUI() {
    const res = await fetch(`${API_BASE}/skills`, { headers: HEADERS });
    const skills = await res.json();
    
    // Update Overview counter
    document.getElementById('count-skills').innerText = skills.length;

    const container = document.getElementById('skills-list-container');
    container.innerHTML = skills.map(s => `
        <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100 relative group">
            <button onclick="deleteSkill(${s.id})" class="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
            <div class="text-[10px] font-black uppercase text-purple-600 mb-1">${s.category}</div>
            <div class="font-bold text-slate-800 mb-3">${s.name}</div>
            <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden">
                <div class="bg-purple-500 h-full" style="width: ${s.proficiencyLevel}%"></div>
            </div>
            <div class="mt-2 text-[10px] font-bold text-slate-400 text-right">${s.proficiencyLevel}%</div>
        </div>
    `).join('');
    lucide.createIcons();
}
