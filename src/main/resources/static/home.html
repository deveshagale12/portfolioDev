<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; background-color: #0f172a; color: white; }
        .hero-gradient { background: radial-gradient(circle at top right, #1e3a8a, transparent), radial-gradient(circle at bottom left, #581c87, transparent); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .skill-card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 glass border-b border-white/10 py-4 px-8 flex justify-between items-center">
        <h1 id="nav-name" class="font-black text-xl tracking-tighter text-blue-400">PORTFOLIO</h1>
        <div class="hidden md:flex gap-8 text-sm font-bold uppercase tracking-widest text-slate-400">
            <a href="#about" class="hover:text-white transition">About</a>
            <a href="#projects" class="hover:text-white transition">Projects</a>
            <a href="#skills" class="hover:text-white transition">Skills</a>
            <a href="#contact-form" class="hover:text-white transition">Contact</a>
        </div>
    </nav>

    <header class="min-h-screen flex flex-col justify-center items-center px-6 hero-gradient relative overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-10"></div>
        
        <div class="relative z-10 mb-8">
            <img id="hero-img" src="" alt="Profile" 
                 class="w-40 h-40 rounded-[2.5rem] border-4 border-blue-500/20 object-cover shadow-2xl hidden ring-8 ring-white/5">
        </div>

        <h2 id="hero-name" class="text-5xl md:text-8xl font-black mb-4 text-center tracking-tight">Loading...</h2>
        <p id="hero-title" class="text-xl md:text-2xl text-blue-400 font-medium mb-8 text-center uppercase tracking-[0.2em]"></p>
        
        <div class="flex gap-4 relative z-10">
            <a id="btn-resume" href="#" target="_blank" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-full font-bold transition shadow-xl shadow-blue-900/40 flex items-center gap-2">
                <i data-lucide="download" class="w-4 h-4"></i> Download CV
            </a>
            <a href="#projects" class="glass px-8 py-4 rounded-full font-bold hover:bg-white/10 transition">View Work</a>
        </div>
    </header>

    <section id="about" class="py-32 px-6 max-w-4xl mx-auto text-center">
        <h3 class="text-slate-500 uppercase tracking-widest font-black text-sm mb-4">The Story</h3>
        <p id="about-bio" class="text-xl md:text-3xl leading-relaxed text-slate-300 font-light italic">
            Connecting to your profile...
        </p>
    </section>

    <section id="projects" class="py-24 px-6 bg-slate-900/50">
        <div class="max-w-6xl mx-auto">
            <h3 class="text-3xl font-black mb-12 flex items-center gap-4">
                <span class="w-12 h-1 bg-blue-500 rounded-full"></span>
                Featured Projects
            </h3>
            <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>
    </section>

    <section id="skills" class="py-24 px-6">
        <div class="max-w-6xl mx-auto">
            <h3 class="text-3xl font-black mb-12 text-center">Expertise & Skills</h3>
            <div id="skills-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                </div>
        </div>
    </section>

    <section id="contact-form" class="py-24 px-6 bg-slate-900/30">
        <div class="max-w-3xl mx-auto glass p-8 md:p-12 rounded-[3rem] border-white/5 shadow-2xl">
            <div class="text-center mb-10">
                <h3 class="text-3xl font-black mb-2 text-blue-400">Send a Message</h3>
                <p class="text-slate-400 text-sm">I'll get back to you within 24 hours.</p>
            </div>
            
            <form id="public-contact-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Your Name</label>
                        <input type="text" id="msg-name" required placeholder="Full Name" 
                               class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-blue-500 outline-none transition text-white">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Email Address</label>
                        <input type="email" id="msg-email" required placeholder="email@provider.com" 
                               class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-blue-500 outline-none transition text-white">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Your Message</label>
                    <textarea id="msg-content" required rows="5" placeholder="What are we building?" 
                              class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-blue-500 outline-none transition text-white"></textarea>
                </div>
                
                <button type="button" onclick="sendMessage()" 
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-900/20 transition-all flex items-center justify-center gap-3 group">
                    <span>Dispatch Message</span>
                    <i data-lucide="send" class="w-5 h-5 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                </button>
            </form>
            <div id="form-status" class="hidden mt-6 p-4 rounded-2xl text-center font-bold"></div>
        </div>
    </section>

    <footer class="py-12 px-8 border-t border-white/5 bg-slate-950">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div>
                <h4 id="footer-name" class="font-black text-xl tracking-tighter text-white mb-2 uppercase">Portfolio</h4>
                <p class="text-slate-500 text-sm">Built with Spring Boot & Tailwind CSS</p>
            </div>
            
            <div id="social-links" class="flex gap-6 text-slate-400">
                </div>
            
            <p class="text-slate-600 text-[10px] font-bold uppercase tracking-widest">
                &copy; 2024 All Rights Reserved
            </p>
        </div>
    </footer>

    <script>
        const API_BASE = "http://localhost:8080/api/v1";
        const SERVER_URL = "http://localhost:8080"; // Base URL for images

        async function initPortfolio() {
            try {
                const res = await fetch(`${API_BASE}/portfolio/summary`, {
                    headers: { "X-API-KEY": "portfolio-dev" } 
                });
                const data = await res.json();
                
                renderProfile(data.profile);
                renderProjects(data.projects);
                renderSkills(data.skills);
                
                lucide.createIcons();
            } catch (err) {
                console.error("Failed to load portfolio", err);
                document.getElementById('hero-name').innerText = "Server Offline";
            }
        }

        function renderProfile(p) {
            if(!p) return;
            
            // Text Updates
            document.getElementById('nav-name').innerText = p.name.toUpperCase();
            document.getElementById('footer-name').innerText = p.name;
            document.getElementById('hero-name').innerText = p.name;
            document.getElementById('hero-title').innerText = p.title;
            document.getElementById('about-bio').innerText = p.bio;

            // Profile Image Update
            if(p.profilePictureUrl) {
                const img = document.getElementById('hero-img');
                // Check if URL is absolute or relative
                img.src = p.profilePictureUrl.startsWith('http') ? p.profilePictureUrl : `${SERVER_URL}${p.profilePictureUrl}`;
                img.classList.remove('hidden');
            }

            // Resume Link
            if(p.resumeUrl) {
                const resumeBtn = document.getElementById('btn-resume');
                resumeBtn.href = p.resumeUrl.startsWith('http') ? p.resumeUrl : `${SERVER_URL}${p.resumeUrl}`;
            }

            // Socials
            const socials = document.getElementById('social-links');
            socials.innerHTML = ''; // Clear defaults
            if(p.github) socials.innerHTML += `<a href="${p.github}" target="_blank" class="hover:text-blue-400 transition"><i data-lucide="github"></i></a>`;
            if(p.linkedinUrl) socials.innerHTML += `<a href="${p.linkedinUrl}" target="_blank" class="hover:text-blue-400 transition"><i data-lucide="linkedin"></i></a>`;
            if(p.twitterUrl) socials.innerHTML += `<a href="${p.twitterUrl}" target="_blank" class="hover:text-blue-400 transition"><i data-lucide="twitter"></i></a>`;
        }

        function renderProjects(projects) {
            const container = document.getElementById('project-grid');
            if(!projects || projects.length === 0) {
                container.innerHTML = `<p class="text-slate-500">Working on new things...</p>`;
                return;
            }

            container.innerHTML = projects.map(p => `
                <div class="glass rounded-3xl overflow-hidden group hover:border-blue-500/50 transition-all duration-300">
                    <div class="h-56 bg-slate-800 overflow-hidden relative">
                        <img src="${p.imageUrl ? (p.imageUrl.startsWith('http') ? p.imageUrl : SERVER_URL + p.imageUrl) : 'https://placehold.co/600x400/1e293b/white?text=Project'}" 
                             class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
                             <div class="flex gap-3">
                                ${p.githubUrl ? `<a href="${p.githubUrl}" target="_blank" class="p-2 bg-white/10 rounded-full hover:bg-blue-600 transition"><i data-lucide="github" class="w-5 h-5"></i></a>` : ''}
                                ${p.liveDemoUrl ? `<a href="${p.liveDemoUrl}" target="_blank" class="p-2 bg-white/10 rounded-full hover:bg-blue-600 transition"><i data-lucide="external-link" class="w-5 h-5"></i></a>` : ''}
                             </div>
                        </div>
                    </div>
                    <div class="p-6">
                        <h4 class="text-xl font-bold mb-2 text-white">${p.title}</h4>
                        <p class="text-slate-400 text-sm mb-4 line-clamp-2">${p.description || 'No description provided.'}</p>
                        <div class="flex flex-wrap gap-2">
                            ${(p.techStack || '').split(',').map(t => t.trim() ? `<span class="text-[9px] font-black px-2 py-1 bg-blue-500/10 rounded text-blue-400 uppercase tracking-tighter">${t}</span>` : '').join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderSkills(skills) {
            const container = document.getElementById('skills-grid');
            if(!skills || skills.length === 0) return;

            container.innerHTML = skills.map(s => `
                <div class="glass p-6 rounded-2xl text-center skill-card transition-all border border-white/5">
                    <div class="text-blue-400 font-bold mb-2 text-sm">${s.name}</div>
                    <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden mb-2">
                        <div class="bg-blue-500 h-full" style="width: ${s.proficiencyLevel}%"></div>
                    </div>
                    <div class="text-[9px] text-slate-500 uppercase font-black tracking-widest">${s.proficiencyLevel}% Proficiency</div>
                </div>
            `).join('');
        }
        
        async function sendMessage() {
            const btn = event.currentTarget;
            const name = document.getElementById('msg-name').value;
            const email = document.getElementById('msg-email').value;
            const message = document.getElementById('msg-content').value;
            const statusDiv = document.getElementById('form-status');

            if (!name || !email || !message) {
                alert("Please fill in all fields.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processing...`;
            lucide.createIcons();

            try {
                const res = await fetch(`${API_BASE}/contact/send`, {
                    method: 'POST',
                    headers: { 
                        "Content-Type": "application/json",
                        "X-API-KEY": "portfolio-dev" 
                    },
                    body: JSON.stringify({ senderName: name, senderEmail: email, message: message })
                });

                if (res.ok) {
                    statusDiv.innerText = "Message received! I'll be in touch soon. 🚀";
                    statusDiv.className = "mt-6 p-4 rounded-2xl text-center font-bold bg-blue-500/10 text-blue-400 block";
                    document.getElementById('public-contact-form').reset();
                } else { throw new Error(); }
            } catch (err) {
                statusDiv.innerText = "Connection error. Please try again.";
                statusDiv.className = "mt-6 p-4 rounded-2xl text-center font-bold bg-red-500/10 text-red-400 block";
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>Dispatch Message</span> <i data-lucide="send" class="w-5 h-5"></i>`;
                lucide.createIcons();
            }
        }

        window.onload = initPortfolio;
    </script>
</body>
</html>
